<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythos</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <a class="visually-hidden skip" href="#">Skip to main content</a>

    <header class="topnav">
      <h2 class="visually-hidden">Header</h2>
      <div class="wrapper topnav__wrapper">
        <a href="/" class="topnav__homelink">
          <img
            src="/imgs/logo-mythos.svg"
            alt="Mythos homepage"
            class="topnav__logo"
            width="128"
            height="36"
          />
        </a>

        <nav>
          <ul class="topnav__links">
            <li>
              <a href="" class="topnav__link">Features</a>
            </li>
            <li>
              <a href="" class="topnav__link">Pricing</a>
            </li>
            <li>
              <a href="" class="topnav__link">About</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="hero">
        <div class="wrapper hero__wrapper">
          <div class="hero__image-wrapper">
            <img class="hero__image" src="/imgs/unicorn.svg" alt="" />
          </div>
          <div class="hero__text">
            <h1 class="hero__title">Find that elusive unicorn.</h1>
            <p class="hero__para">
              Mythos will enable you to discover the newest startups to invest
              in. Powered by AI, used by millions of humans.
            </p>
            <div class="hero__buttons">
              <button class="button button--primary">Free trial</button>
              <button class="button button--secondary">Pricing</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <h2 class="visually-hidden">Footer</h2>
    </footer>
  </body>
</html>
